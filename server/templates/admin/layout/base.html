<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FastAPI Admin{% endblock %}</title>
    
    <!-- Tailwind CSS & Flowbite -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    
    <!-- Configuración de colores personalizados para coincidir con FastAPI (Teal) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {"50":"#f0fdfa","100":"#ccfbf1","200":"#99f6e4","300":"#5eead4","400":"#2dd4bf","500":"#14b8a6","600":"#0d9488","700":"#0f766e","800":"#115e59","900":"#134e4a","950":"#042f2e"}
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos base adicionales */
        body {
            /* Fondo degradado oscuro estilo "OG" pero moderno */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-nav {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-sidebar {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-gray-200 antialiased">

    <!-- Navbar -->
    <nav class="fixed top-0 z-50 w-full glass-nav">
        <div class="px-3 py-3 lg:px-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center justify-start rtl:justify-end">
                    <button data-drawer-target="logo-sidebar" data-drawer-toggle="logo-sidebar" aria-controls="logo-sidebar" type="button" class="inline-flex items-center p-2 text-sm text-gray-400 rounded-lg sm:hidden hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-600">
                        <span class="sr-only">Open sidebar</span>
                        <svg class="w-6 h-6" aria-hidden="true" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                           <path clip-rule="evenodd" fill-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"></path>
                        </svg>
                    </button>
                    <a href="/admin" class="flex ms-2 md:me-24">
                        <!-- FastAPI Logo (SVG simplificado) -->
                        <svg class="h-8 w-8 me-3 text-primary-500" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
                            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="self-center text-xl font-semibold sm:text-2xl whitespace-nowrap text-white">FastAPI Admin</span>
                    </a>
                </div>
                <div class="flex items-center">
                    <div class="flex items-center ms-3">
                        <div>
                            <button type="button" class="flex text-sm bg-gray-800 rounded-full focus:ring-4 focus:ring-gray-600" aria-expanded="false" data-dropdown-toggle="dropdown-user">
                                <span class="sr-only">Open user menu</span>
                                <div class="w-9 h-9 rounded-full bg-primary-600 flex items-center justify-center text-white font-bold border-2 border-primary-400">A</div>
                            </button>
                        </div>
                        <div class="z-50 hidden my-4 text-base list-none bg-gray-700 divide-y divide-gray-600 rounded shadow glass" id="dropdown-user">
                            <div class="px-4 py-3" role="none">
                                <p class="text-sm text-white" role="none">
                                    Administrador
                                </p>
                                <p class="text-sm font-medium text-gray-300 truncate" role="none">
                                    admin@fastapi.demo
                                </p>
                            </div>
                            <ul class="py-1" role="none">
                                <li>
                                    <a href="/admin" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-600 hover:text-white" role="menuitem">Dashboard</a>
                                </li>
                                <li>
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-600 hover:text-white" role="menuitem">Configuración</a>
                                </li>
                                <li>
                                    <a href="/admin/login" class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-600 hover:text-white" role="menuitem">Cerrar Sesión</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside id="logo-sidebar" class="fixed top-0 left-0 z-40 w-64 h-screen pt-20 transition-transform -translate-x-full glass-sidebar sm:translate-x-0" aria-label="Sidebar">
        <div class="h-full px-3 pb-4 overflow-y-auto bg-transparent flex flex-col">
            <ul class="space-y-2 font-medium flex-1">
                <li>
                    <a href="/admin" class="flex items-center p-2 text-white rounded-lg hover:bg-gray-700 group">
                        <i class="fa-solid fa-gauge-high w-5 h-5 text-gray-400 transition duration-75 group-hover:text-white text-center"></i>
                        <span class="ms-3">Dashboard</span>
                    </a>
                </li>
                
                <!-- Mock Links -->
                <li>
                    <a href="#" class="flex items-center p-2 text-white rounded-lg hover:bg-gray-700 group">
                        <i class="fa-solid fa-users w-5 h-5 text-gray-400 transition duration-75 group-hover:text-white text-center"></i>
                        <span class="flex-1 ms-3 whitespace-nowrap">Usuarios</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="flex items-center p-2 text-white rounded-lg hover:bg-gray-700 group">
                        <i class="fa-solid fa-box-open w-5 h-5 text-gray-400 transition duration-75 group-hover:text-white text-center"></i>
                        <span class="flex-1 ms-3 whitespace-nowrap">Productos</span>
                    </a>
                </li>
                
                <!-- Logs Link -->
                <li>
                    <a href="/admin/logs" class="flex items-center p-2 text-white rounded-lg hover:bg-gray-700 group">
                        <i class="fa-solid fa-terminal w-5 h-5 text-gray-400 transition duration-75 group-hover:text-white text-center"></i>
                        <span class="flex-1 ms-3 whitespace-nowrap">System Logs</span>
                        <span class="inline-flex items-center justify-center px-2 ms-3 text-sm font-medium text-gray-800 bg-primary-200 rounded-full">Live</span>
                    </a>
                </li>
            </ul>
            <div class="mt-auto border-t border-gray-700 pt-4">
                <a href="/admin/login" class="flex items-center p-2 text-white rounded-lg hover:bg-red-900/50 group text-red-400 hover:text-red-300">
                    <i class="fa-solid fa-right-from-bracket w-5 h-5 transition duration-75 group-hover:text-red-300 text-center"></i>
                    <span class="flex-1 ms-3 whitespace-nowrap">Cerrar Sesión</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Content -->
    <div class="p-4 sm:ml-64">
        <div class="p-4 mt-14">
            <!-- Breadcrumb (Opcional pero útil estilo Django) -->
            <nav class="flex mb-4" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li class="inline-flex items-center">
                        <a href="/admin" class="inline-flex items-center text-sm font-medium text-gray-700 hover:text-primary-600 dark:text-gray-400 dark:hover:text-white">
                            <svg class="w-3 h-3 me-2.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                                <path d="m19.707 9.293-2-2-7-7a1 1 0 0 0-1.414 0l-7 7-2 2a1 1 0 0 0 1.414 1.414L2 10.414V18a2 2 0 0 0 2 2h3a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h3a2 2 0 0 0 2-2v-7.586l.293.293a1 1 0 0 0 1.414-1.414Z"/>
                            </svg>
                            Inicio
                        </a>
                    </li>
                    {% block breadcrumbs %}{% endblock %}
                </ol>
            </nav>

            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
</body>
</html>
